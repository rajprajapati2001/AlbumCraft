<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbumCraft</title>
    <link rel="icon" type="image/png" href="icon/albumcraft_circle_image.png">
    <link rel="stylesheet" href="styles/layout.css">
    <script src="javascript/script.js"></script>
    <script src="image_script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="control-bar">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px;">
            <p style="margin:0; font-weight:700; color:var(--primary-blue);">
                <img src="icon/albumcraft-grid-line-icon.png" style="width: 20px; height: 20px; margin-right: 8px;" onerror="this.style.display='none'">
                AlbumCraft
            </p>
            <span id="sizeDisplay" style="font-size:11px; font-weight:bold; color:var(--accent-orange)">Est. PDF: ~0.0 MB</span>
        </div>

        <div class="control-group">
            <label>
                <span><i class="fa-solid fa-file-import"></i> Upload</span>
                <span class="val-badge" id="v_count">0</span>
            </label>
            <div style="display: flex; gap: 5px;">
                <input type="file" id="imageUpload" multiple accept="image/*" onchange="handleFiles(this.files)" style="display: none;">
                
                <button class="btn" onclick="document.getElementById('imageUpload').click()" style="background-color: #3498db;" title="Select Images">
                    <i class="fa-solid fa-upload"></i>
                </button>
                
                <button class="btn" onclick="confirmLoadSamples()" style="background-color: #3498db;" title="Load Samples">
                    <i class="fa-solid fa-folder-open"></i>
                </button>
                
                <button class="btn btn-reset" onclick="resetGallery()" title="Clear All">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        </div>

        <div class="control-group">
            <label>
                <span><i class="fa-solid fa-share-nodes"></i> 1. Export</span> 
            </label>
            <div style="display: flex; gap: 5px;">
                <button class="btn btn-download" id="dlBtn" onclick="downloadPDF()"><i class="fa-solid fa-file-pdf"></i></button>
                <button class="btn btn-print" onclick="triggerPrint()"><i class="fa-solid fa-print"></i> Print</button>
            </div>
        </div>

        <div class="control-group">
            <label><span><i class="fa-solid fa-table-columns"></i> 2. Columns</span> <span class="val-badge" id="v_col">4x</span></label>
            <input type="range" id="colRange" min="1" max="10" value="4" oninput="updateUI()">
        </div>

        <div class="control-group">
            <label><span><i class="fa-solid fa-up-right-and-down-left-from-center"></i> 3. Quality</span> <span class="val-badge" id="v_scale">2.0</span></label>
            <input type="range" id="pdfScale" min="1" max="3" step="0.1" value="2" oninput="updateUI()">
        </div>

        <div class="control-group">
            <label><span><i class="fa-solid fa-border-top-left"></i> 4. Corners</span> <span class="val-badge" id="v_rad">0px</span></label>
            <input type="range" id="radiusRange" min="0" max="100" value="0" oninput="updateUI()">
        </div>

        <div class="control-group">
            <label><span><i class="fa-solid fa-calendar-day"></i> 5. Format</span></label>
            <select id="dateFormat" onchange="updateUI()" style="padding: 4px;">
<option value="DD MMMM YYYY" data-example="DD MMMM YYYY">Loading...</option>
    <option value="DD/MM/YYYY" data-example="DD/MM/YYYY">Loading...</option>
    <option value="MM/DD/YYYY" data-example="MM/DD/YYYY">Loading...</option>
    <option value="YYYY-MM-DD" data-example="YYYY-MM-DD">Loading...</option>
    <option value="DD-MM-YYYY" data-example="DD-MM-YYYY">Loading...</option>
    <option value="MMMM DD, YYYY" data-example="MMMM DD, YYYY">Loading...</option>
    <option value="DD MMM YYYY" data-example="DD MMM YYYY">Loading...</option>
    <option value="YYYY/MM/DD" data-example="YYYY/MM/DD">Loading...</option>
    <option value="MMM DD, YYYY" data-example="MMM DD, YYYY">Loading...</option>
    <option value="DD.MM.YYYY" data-example="DD.MM.YYYY">Loading...</option>
    <option value="YYYY.MM.DD" data-example="YYYY.MM.DD">Loading...</option>
    <option value="DD/MM/YY" data-example="DD/MM/YY">Loading...</option>
    <option value="MM-DD-YYYY" data-example="MM-DD-YYYY">Loading...</option>
    <option value="DD MMM, YYYY" data-example="DD MMM, YYYY">Loading...</option>
            </select>
        </div>

        <div class="control-group">
            <label><span><i class="fa-solid fa-arrow-down-z-a"></i> 6. Sort By</span></label>
            <select id="sortBy" onchange="updateUI()" style="padding: 4px;">
                <option value="name-asc">Name (A-Z)</option>
                <option value="name-desc">Name (Z-A)</option>
                <option value="date-asc">Oldest First</option>
                <option value="date-desc">Newest First</option>
            </select>
        </div>

        <div class="control-group" style="min-width: 250px;">
            <label><span><i class="fa-solid fa-sliders"></i> 7. Visibility</span></label>
            <div class="checkbox-container">
                <label class="check-item"><input type="checkbox" id="checkName" onclick="updateUI()"> Name</label>
                <label class="check-item"><input type="checkbox" id="checkDate" onclick="updateUI()" checked> Date</label>
                <label class="check-item"><input type="checkbox" id="checkTime" onclick="updateUI()" checked> Time</label>
                <label class="check-item"><input type="checkbox" id="check24h" onclick="updateUI()"> 24h</label>
                <label class="check-item" style="color: #e67e22;"><input type="checkbox" id="checkBgRemove" onclick="updateUI()"> BG Remove</label>
            </div>
        </div>
    </div>

    <div id="printArea">
        <div class="grid-container" id="mainGrid"></div>
        <footer id="dynamicFooter">
            <img src="icon/albumcraft-grid-line-icon.png" class="footer-logo" onerror="this.style.display='none'">
            AlbumCraft 2026 <span class="hide-on-print">@ Raj Prajapati</span>
            <span class="print-timestamp" id="printTime"></span>
        </footer>
    </div>
</body>
<script>
function renderGrid() {
    const container = document.getElementById("mainGrid");
    container.innerHTML = "";

    selectedFiles.forEach((file, idx) => {
        const { dateStr, timeStr } = formatDateTime(file.date);
        file.rot = file.rot || 0;
        file.flip = file.flip || 1;

        const item = document.createElement("div");
        item.className = "grid-item";
        item.dataset.index = idx;

        // --- Desktop Mouse Drag ---
        item.setAttribute('draggable', true);
        item.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', idx);
            item.classList.add('dragging');
        };
        item.ondragend = () => item.classList.remove('dragging');
        item.ondragover = (e) => e.preventDefault();
        item.ondrop = (e) => {
            e.preventDefault();
            const fromIdx = e.dataTransfer.getData('text/plain');
            moveItem(fromIdx, idx);
        };

        // --- Mobile Touch Drag Logic ---
        let isDragging = false;
        const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        item.innerHTML = `
            <div class="img-tools">
                <button class="tool-btn drag-trigger"
                        style="cursor: grab; touch-action: none;">
                    <i class="fa-solid fa-grip-vertical"></i>
                </button>
                <button class="tool-btn" onclick="transformImg(${idx}, 'rot')"><i class="fa-solid fa-rotate"></i></button>
                <button class="tool-btn" onclick="transformImg(${idx}, 'flip')"><i class="fa-solid fa-arrows-left-right"></i></button>
                <button class="tool-btn btn-del" onclick="removeImg(${idx})"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div class="filename">${file.name}</div>
            <img src="${file.objectURL}" id="img-${idx}"
         style="transform: rotate(${file.rot}deg) scaleX(${file.flip}); max-width: 100%; ${isMobile ? '' : ''}"
         onerror="handleImgError(this, ${file.isSample})">
            <div class="metadata">
                <span class="date-part">${dateStr}</span><span class="sep-part"> ● </span><span class="time-part">${timeStr}</span>
            </div>
        `;

        // Attach touch events specifically to the drag-trigger button
        const handle = item.querySelector('.drag-trigger');

        handle.ontouchstart = (e) => {
            isDragging = true;
            item.classList.add('dragging');
            document.body.style.overflow = 'hidden';
        };

        handle.ontouchmove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
        };

        handle.ontouchend = (e) => {
            if (!isDragging) return;
            isDragging = false;
            item.classList.remove('dragging');
            document.body.style.overflow = '';

            const touch = e.changedTouches[0];
            const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropZone = targetEl ? targetEl.closest('.grid-item') : null;

            if (dropZone && dropZone.dataset.index !== undefined) {
                moveItem(idx, dropZone.dataset.index);
            }
        };

        container.appendChild(item);
    });
}    
</script>
</html>
